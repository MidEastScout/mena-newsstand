name: MENA Newsstand

# One integrated job drives everything:
#   • every 30 min  → refresh headlines.json  (keeps the Headlines tab live)
#   • 05:05 UTC     → full run: headlines + front-page images + morning email
#   • 11:05 UTC     → refresh front-page images (Western editions are up by now)
#   • manual run    → full run (handy for testing)
#
# Cron minutes are deliberately off the hour. GitHub de-prioritises scheduled
# runs at :00 under load, which is why the old '0 7 * * *' job kept getting
# dropped. Offsetting to :05/:15/:45 makes runs far more reliable.

on:
  schedule:
    - cron: '15,45 * * * *'   # every 30 min — headlines only
    - cron: '5 5 * * *'       # daily 05:05 UTC — headlines + front pages + email
    - cron: '5 11 * * *'      # daily 11:05 UTC — refresh front pages
  workflow_dispatch:           # manual trigger (also sends the email)

permissions:
  contents: write

# Serialise runs so the 30-min and daily jobs never race on git push.
concurrency:
  group: newsstand-data
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Determine run type
        run: |
          EVENT="${{ github.event_name }}"
          SCHED="${{ github.event.schedule }}"
          DO_FP=false
          DO_EMAIL=false
          if [ "$EVENT" = "workflow_dispatch" ]; then DO_FP=true; DO_EMAIL=true; fi
          if [ "$SCHED" = "5 5 * * *" ]; then DO_FP=true; DO_EMAIL=true; fi
          if [ "$SCHED" = "5 11 * * *" ]; then DO_FP=true; fi
          echo "DO_FRONTPAGES=$DO_FP" >> "$GITHUB_ENV"
          echo "DO_EMAIL=$DO_EMAIL" >> "$GITHUB_ENV"
          echo "event=$EVENT schedule='$SCHED' frontpages=$DO_FP email=$DO_EMAIL"

      - name: Fetch headlines
        run: python scripts/fetch_headlines.py

      # continue-on-error: a bad day at the cover CDNs must never block the
      # headlines refresh or the morning email. The script already exits 0 on
      # partial failure; this guards against an unexpected crash too.
      - name: Fetch front pages
        if: ${{ env.DO_FRONTPAGES == 'true' }}
        continue-on-error: true
        run: python scripts/fetch_frontpages.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # frontpages/ only exists on full runs; never let a missing pathspec
          # fail the headlines-only (every-30-min) commit.
          git add headlines.json
          git add frontpages 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing changed — skipping commit."
          else
            git commit -m "chore: refresh data $(date -u +%Y-%m-%dT%H:%MZ)"
            for i in 1 2 3 4 5; do
              if git pull --rebase --autostash origin main && git push origin main; then
                echo "Pushed."; break
              fi
              echo "Push attempt $i failed; retrying…"; sleep $((i * 3))
            done
          fi

      # always(): the digest must go out even if the front-page or push step
      # had trouble, as long as this is a full run and the secrets are set.
      - name: Send email digest
        if: ${{ always() && env.DO_EMAIL == 'true' && env.EMAIL_FROM != '' }}
        run: python scripts/send_email.py

      - name: Email skipped notice
        if: ${{ always() && env.DO_EMAIL == 'true' && env.EMAIL_FROM == '' }}
        run: |
          echo "::warning::Email digest skipped — EMAIL_FROM/EMAIL_TO/EMAIL_PASSWORD"
          echo "repository secrets are not set. Add them under Settings →"
          echo "Secrets and variables → Actions for the morning email to send."
