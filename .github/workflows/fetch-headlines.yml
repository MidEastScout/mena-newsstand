name: MENA Newsstand

# WHAT THIS WORKFLOW DOES (plain English)
# =========================================
# This file tells GitHub how to keep the site updated automatically.
# It runs the Python scripts in the scripts/ folder on a schedule and
# commits the results back to the repo so the website always shows fresh data.
#
# WHAT RUNS EVERY 30 MINUTES (every run):
#   - scripts/fetch_headlines.py → reads the 16 RSS feeds and writes
#     headlines.json, which the website loads to show the Headlines tab.
#
# WHAT RUNS ONCE A DAY AT ~7 AM ISRAEL TIME (morning run only):
#   - scripts/fetch_frontpages.py → downloads today's newspaper front-page
#     images and saves them under frontpages/. The website shows these images
#     on the Front Pages tab.
#   - scripts/send_email.py → sends the morning email digest (only if you
#     have set up the EMAIL_FROM / EMAIL_TO / EMAIL_PASSWORD secrets).
#
# WHAT RUNS ONCE A DAY AT ~2 PM ISRAEL TIME (afternoon run only):
#   - scripts/fetch_frontpages.py again → updates the front-page images a
#     second time to catch later editions published after the morning run.
#
# HOW THE 30-MINUTE SCHEDULE WORKS
# ==================================
# GitHub's own timed schedule ("cron") is unreliable and often runs late or
# gets skipped. So the primary trigger is an external service (cron-job.org)
# that calls this workflow via the "workflow_dispatch" trigger every 30 minutes
# like clockwork. The schedule lines below are just a backup in case that
# external service ever has a problem.
#
# The once-a-day routines (front pages, email) use scripts/plan_run.py as a
# gatekeeper: it checks the current time in Israel and a small file called
# state/daily.json to make sure each daily task runs exactly once — even if
# the 7 AM trigger fires a bit late.

on:
  schedule:
    - cron: '15,45 * * * *'   # backup heartbeat (cron-job.org is the primary)
  workflow_dispatch:           # primary 30-min heartbeat + manual runs
    inputs:
      send_email:
        description: 'Force-send the email digest now'
        type: boolean
        default: false
      refresh_frontpages:
        description: 'Force-refresh front-page images now'
        type: boolean
        default: false

permissions:
  contents: write

# Serialise runs so the 30-min and daily jobs never race on git push.
concurrency:
  group: newsstand-data
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Plan the run (daily email + front pages, off the reliable heartbeat)
        env:
          FORCE_EMAIL: ${{ github.event.inputs.send_email }}
          FORCE_FRONTPAGES: ${{ github.event.inputs.refresh_frontpages }}
        run: python scripts/plan_run.py

      - name: Fetch headlines
        run: python scripts/fetch_headlines.py

      # continue-on-error: a bad day at the cover CDNs must never block the
      # headlines refresh or the morning email. The script already exits 0 on
      # partial failure; this guards against an unexpected crash too.
      - name: Fetch front pages
        if: ${{ env.DO_FRONTPAGES == 'true' }}
        continue-on-error: true
        run: python scripts/fetch_frontpages.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # frontpages/ only changes on full runs; state/daily.json only changes
          # when a daily routine is claimed. Never let a missing pathspec fail
          # the headlines-only (every-30-min) commit.
          git add headlines.json state/daily.json
          git add frontpages 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing changed — skipping commit."
          else
            git commit -m "chore: refresh data $(date -u +%Y-%m-%dT%H:%MZ)"
            for i in 1 2 3 4 5; do
              if git pull --rebase --autostash origin main && git push origin main; then
                echo "Pushed."; break
              fi
              echo "Push attempt $i failed; retrying…"; sleep $((i * 3))
            done
          fi

      # always(): the digest must go out even if the front-page or push step
      # had trouble, as long as this is a full run and the secrets are set.
      - name: Send email digest
        if: ${{ always() && env.DO_EMAIL == 'true' && env.EMAIL_FROM != '' }}
        run: python scripts/send_email.py

      - name: Email skipped notice
        if: ${{ always() && env.DO_EMAIL == 'true' && env.EMAIL_FROM == '' }}
        run: |
          echo "::warning::Email digest skipped — EMAIL_FROM/EMAIL_TO/EMAIL_PASSWORD"
          echo "repository secrets are not set. Add them under Settings →"
          echo "Secrets and variables → Actions for the morning email to send."
