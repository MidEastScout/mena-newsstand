name: MENA Newsstand

# WHAT THIS WORKFLOW DOES (plain English)
# =========================================
# EVERY RUN (about every 30 minutes — see the self-perpetuating loop below):
#   - scripts/fetch_headlines.py  → refreshes headlines.json
#
# EVERY 6 HOURS (first run crossing 00:00 / 06:00 / 12:00 / 18:00 Israel time):
#   - scripts/build_briefing.py   → fetches world feeds + MENA headlines,
#                                   calls Gemini, writes briefing.json
#   - scripts/send_email.py       → sends the digest email (if secrets set)
#
# FRONT PAGES (scripts/fetch_frontpages.py):
#   - ~07:00 Israel (morning) + ~14:00 Israel (afternoon): full refresh of every
#     cover (the afternoon pass also catches late re-plates).
#   - Every ~30-min run in between: a fill-only catch-up that re-fetches ONLY the
#     papers still showing yesterday's edition (US + European/Turkish titles are
#     scanned upstream hours after the 07:00 grab). It skips covers already
#     current and goes quiet once they all are, so a late edition is picked up
#     within ~30 min instead of waiting for the afternoon pass.
#
# HOW THE ~30-MIN REFRESH STAYS ALIVE (self-perpetuating loop)
# ============================================================
# GitHub's built-in `schedule` cron is unreliable for this repo (it silently
# drops most runs), and we no longer depend on any external pinger. Instead the
# workflow keeps ITSELF on schedule: after each run, the `rearm` job waits
# ~28 minutes and then triggers the next run through the GitHub API. Work time
# (~2 min) + wait (~28 min) ≈ a 30-minute cadence.
#
# This needs a Personal Access Token saved as the `DISPATCH_PAT` secret
# (fine-grained, repo = mena-newsstand, permission Actions: Read and write).
#
# Safety / robustness:
#   - The `rearm` job uses concurrency cancel-in-progress, so only ONE timer is
#     ever waiting. Overlapping triggers (manual, schedule, loop) collapse back
#     into a single ~30-min loop instead of multiplying.
#   - The `schedule` below still fires occasionally; if the self-loop ever dies
#     (a run cancelled at the wrong moment, or the PAT lapses), a scheduled run
#     restarts it.
#   - `workflow_dispatch` allows manual "refresh now" runs and an optional
#     external heartbeat.
#   - If DISPATCH_PAT is not set, `rearm` is a no-op and the site falls back to
#     the (unreliable) schedule — nothing breaks.
#
# scripts/plan_run.py acts as a gatekeeper: it checks the current time in
# Israel and state/daily.json so each timed task (briefing, email, front pages)
# runs once per slot — even though headlines refresh on every run.

on:
  schedule:
    - cron: '*/15 * * * *'   # safety net only — the self-dispatch loop is primary
  workflow_dispatch:          # manual "refresh now" + the loop's own dispatch
    inputs:
      send_email:
        description: 'Force-send the email digest now'
        type: boolean
        default: false
      refresh_frontpages:
        description: 'Force-refresh front-page images now'
        type: boolean
        default: false
      refresh_briefing:
        description: 'Force-rebuild the World Briefing now (no email)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    # Expose the exact commit this job leaves on `main` so the deploy job below
    # publishes THAT commit instead of racing a later `ref: main` checkout.
    outputs:
      sha: ${{ steps.commit.outputs.sha }}
    # Serialise the actual work so concurrent runs never race on git push.
    # (Per-job, so the rearm timer below does not block manual refreshes.)
    concurrency:
      group: newsstand-data
      cancel-in-progress: false
    env:
      EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
      EMAIL_TO:       ${{ secrets.EMAIL_TO }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Plan the run
        env:
          FORCE_EMAIL:       ${{ github.event.inputs.send_email }}
          FORCE_FRONTPAGES:  ${{ github.event.inputs.refresh_frontpages }}
          FORCE_BRIEFING:    ${{ github.event.inputs.refresh_briefing }}
        run: python scripts/plan_run.py

      - name: Fetch headlines
        run: python scripts/fetch_headlines.py

      # Media Pulse word cloud — cheap, no API, runs every refresh.
      - name: Build media pulse
        continue-on-error: true
        run: python scripts/build_pulse.py

      # Outlet & Topic Trends — cheap, no API, runs every refresh.
      - name: Build topic trends
        continue-on-error: true
        run: python scripts/build_trends.py

      # Build the world briefing every 6 hours. continue-on-error so a Gemini
      # quota or network hiccup never blocks the headlines commit or email.
      - name: Build world briefing
        if: ${{ env.DO_BRIEFING == 'true' }}
        continue-on-error: true
        run: python scripts/build_briefing.py

      # Front-page images: full refresh on the morning + afternoon slots, plus a
      # fill-only catch-up in between (FRONTPAGES_FILL_ONLY, set by plan_run via
      # $GITHUB_ENV) that re-fetches only the papers still a day behind.
      # continue-on-error: a CDN outage must never block headlines or email.
      - name: Fetch front pages
        if: ${{ env.DO_FRONTPAGES == 'true' }}
        continue-on-error: true
        run: python scripts/fetch_frontpages.py

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add headlines.json state/daily.json
          git add pulse.json 2>/dev/null || true
          git add briefing.json 2>/dev/null || true
          git add trends.json state/trends_history.json 2>/dev/null || true
          git add frontpages 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing changed — skipping commit."
          else
            git commit -m "chore: refresh data $(date -u +%Y-%m-%dT%H:%MZ)"
            for i in 1 2 3 4 5; do
              if git pull --rebase --autostash origin main && git push origin main; then
                echo "Pushed."; break
              fi
              echo "Push attempt $i failed; retrying…"; sleep $((i * 3))
            done
          fi
          # Hand the deploy job the exact commit now on main so it publishes
          # THIS commit (deterministic) instead of re-resolving `main` and
          # possibly racing another run's push.
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # Send email after the commit so it links to the freshest data. always()
      # means it runs even if the front-page or push step had trouble.
      - name: Send email digest
        if: ${{ always() && env.DO_EMAIL == 'true' && env.EMAIL_FROM != '' }}
        run: python scripts/send_email.py

      - name: Email skipped notice
        if: ${{ always() && env.DO_EMAIL == 'true' && env.EMAIL_FROM == '' }}
        run: |
          echo "::warning::Email digest skipped — EMAIL_FROM/EMAIL_TO/EMAIL_PASSWORD"
          echo "repository secrets are not set. Add them under Settings →"
          echo "Secrets and variables → Actions for the digest emails to send."

  # ---------------------------------------------------------------------------
  # Publish to GitHub Pages ourselves, every run, right after the data commit.
  # WHY: GitHub's legacy "deploy from branch" builder was unreliable for this
  # repo — it silently dropped about every other refresh, so the LIVE site
  # lagged ~1 hour behind `main` even though the data committed every 30 min.
  # (Diagnosed from the pages-build-deployment history: four 30-min refreshes
  # in a row, but only two distinct commits ever reached the site.)
  # Deploying from the workflow makes the live site match the exact commit we
  # just pushed — deterministic, no skipped refreshes.
  #
  # configure-pages (enablement: true) only sets the Pages "Source" to
  # "GitHub Actions" when it CREATES the site for the first time. On a repo whose
  # site was first created as "Deploy from a branch" it leaves the source alone,
  # so GitHub's managed `pages-build-deployment` builder keeps firing on EVERY
  # push and RACES this job for the single github-pages environment. That
  # collision is what wedged deploys in "deployment_queued" until they timed out,
  # were cancelled, and then failed the same-commit retry with "Deployment
  # cancelled." The "Force Pages source" step below flips the source to
  # "workflow" so only this workflow deploys. If it can't (token lacks the Pages
  # permission), set it by hand once: Settings → Pages → Build and deployment →
  # Source → "GitHub Actions".
  # ---------------------------------------------------------------------------
  deploy:
    needs: run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
      deployments: write   # lets the "clear stuck deployment" step read/cancel
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    # Serialise deploys; never cancel one mid-publish.
    concurrency:
      group: newsstand-pages
      cancel-in-progress: false
    steps:
      - name: Checkout the exact commit the run job published
        uses: actions/checkout@v4
        with:
          # Publish the commit the run job just pushed (deterministic) rather
          # than re-resolving `main`, which can race the push and ship a stale
          # commit. Falls back to `main` if the output is somehow empty.
          ref: ${{ needs.run.outputs.sha || 'main' }}

      - name: Configure Pages (first-time enablement only)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Turn OFF the legacy "deploy from branch" builder by forcing the Pages
      # source to "workflow". Idempotent (a no-op once already on workflow) and
      # tolerant: if the token can't change Pages settings the step only warns.
      # Order of preference: a dedicated PAGES_ADMIN_PAT, then DISPATCH_PAT, then
      # the job's GITHUB_TOKEN (which has pages: write).
      - name: Force Pages source = GitHub Actions (disable legacy branch builder)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.PAGES_ADMIN_PAT || secrets.DISPATCH_PAT || github.token }}
        run: |
          api="https://api.github.com/repos/${{ github.repository }}/pages"
          hdr=(-H "Accept: application/vnd.github+json"
               -H "Authorization: Bearer $GH_TOKEN"
               -H "X-GitHub-Api-Version: 2022-11-28")
          # Read the current source first (a plain GET works with GITHUB_TOKEN).
          # If it's already "workflow" this step is a silent no-op — so once the
          # source is fixed there is no recurring warning even without a PAT.
          current=$(curl -sS "${hdr[@]}" "$api" | jq -r '.build_type // empty')
          echo "Current Pages build_type: ${current:-unknown}"
          if [ "$current" = "workflow" ]; then
            echo "Pages source already 'GitHub Actions' — nothing to do."
            exit 0
          fi
          code=$(curl -sS -o /tmp/pages.json -w '%{http_code}' -X PUT "${hdr[@]}" \
            "$api" -d '{"build_type":"workflow"}') || code=000
          echo "PUT /pages build_type=workflow -> HTTP $code"
          if [ "$code" = "204" ] || [ "$code" = "200" ]; then
            echo "Switched Pages source to 'GitHub Actions' — legacy branch builder disabled."
          else
            cat /tmp/pages.json 2>/dev/null || true
            # NOTE: the default GITHUB_TOKEN cannot change Pages settings (it gets
            # 403 "Resource not accessible by integration"), so this warns until
            # the source is fixed by hand or a PAGES_ADMIN_PAT secret is added.
            echo "::warning::Pages source is still '${current:-branch}' and this token"
            echo "::warning::can't change it (HTTP $code). Fix once by hand: Settings ->"
            echo "::warning::Pages -> Build and deployment -> Source -> 'GitHub Actions'."
            echo "::warning::Until then the legacy branch builder keeps racing this deploy."
            echo "::warning::(Or add a PAGES_ADMIN_PAT secret with Pages read+write to"
            echo "::warning::automate it.)"
          fi

      - name: Assemble the published site (everything except git/CI internals)
        run: |
          mkdir -p _site
          rsync -a --delete \
            --exclude='.git' --exclude='.github' --exclude='_site' \
            ./ _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      # A Pages deployment wedged in "in_progress" (e.g. a leftover from an
      # earlier conflict) blocks EVERY future deploy with "in progress
      # deployment, cancel X first" — which would freeze the live site until
      # someone intervenes. Since deploys are serialised by the concurrency
      # group above, any deployment still "in_progress"/"queued" when this job
      # starts is stale, so cancel it. Best-effort and safe.
      - name: Clear any stuck in-progress Pages deployment
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          repo="https://api.github.com/repos/${{ github.repository }}"
          hdr=(-H "Accept: application/vnd.github+json"
               -H "Authorization: Bearer $GH_TOKEN"
               -H "X-GitHub-Api-Version: 2022-11-28")
          latest=$(curl -sS "${hdr[@]}" "$repo/deployments?environment=github-pages&per_page=1")
          sha=$(echo "$latest" | jq -r '.[0].sha // empty')
          id=$(echo "$latest"  | jq -r '.[0].id // empty')
          if [ -z "$id" ]; then echo "No github-pages deployment yet — nothing to clear."; exit 0; fi
          state=$(curl -sS "${hdr[@]}" "$repo/deployments/$id/statuses?per_page=1" | jq -r '.[0].state // "none"')
          echo "Latest github-pages deployment ${sha:0:8} state=$state"
          case "$state" in
            in_progress|queued|pending)
              echo "Stale deployment detected — cancelling ${sha:0:8} so this run can proceed…"
              curl -sS -X POST "${hdr[@]}" "$repo/pages/deployments/$sha/cancel" \
                -w ' -> HTTP %{http_code}\n' || true
              sleep 5 ;;
            *) echo "No stuck deployment to clear." ;;
          esac

      # Deploy is best-effort: the run job already committed the data and a fresh
      # deploy happens every ~30 min, so a transient Pages hiccup must not fail
      # the whole refresh. BOTH attempts use continue-on-error (the old workflow
      # left the retry fatal, and because a timed-out first attempt CANCELS its
      # own deployment, the same-commit retry always saw "Deployment cancelled"
      # and failed the run). `timeout` caps the wait on a wedged deployment so a
      # bad cycle fails fast instead of burning 10 minutes.
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4
        with:
          timeout: 300000

      # A deployment still building when we started makes our create fail with
      # "in progress deployment". Wait for it to settle, then try once more.
      - name: Wait, then retry the deploy if the first attempt failed
        if: steps.deployment.outcome == 'failure'
        run: sleep 75

      - name: Deploy to GitHub Pages (retry)
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
        with:
          timeout: 300000

      - name: Report deploy result
        if: always()
        run: |
          if [ "${{ steps.deployment.outcome }}" = "success" ] \
             || [ "${{ steps.deployment_retry.outcome }}" = "success" ]; then
            echo "Deploy succeeded — live site now matches ${{ needs.run.outputs.sha || 'main' }}."
          else
            echo "::warning::Both deploy attempts failed this cycle; the next ~30-min"
            echo "::warning::refresh will redeploy automatically. If this persists,"
            echo "::warning::confirm Settings -> Pages -> Source is 'GitHub Actions'."
          fi

  # ---------------------------------------------------------------------------
  # Self-perpetuating timer: wait ~28 min, then trigger the next run so the site
  # refreshes about every 30 minutes without relying on GitHub's flaky cron.
  # ---------------------------------------------------------------------------
  rearm:
    needs: run
    if: ${{ always() }}
    runs-on: ubuntu-latest
    # Only ONE timer may wait at a time: a newer run cancels the older timer,
    # so overlapping triggers collapse into a single loop instead of stacking.
    concurrency:
      group: newsstand-rearm
      cancel-in-progress: true
    steps:
      - name: Wait, then dispatch the next run
        env:
          DISPATCH_PAT: ${{ secrets.DISPATCH_PAT }}
        run: |
          if [ -z "$DISPATCH_PAT" ]; then
            echo "DISPATCH_PAT secret is not set — skipping self-dispatch."
            echo "Add a fine-grained PAT (repo: mena-newsstand, Actions: Read"
            echo "and write) as the DISPATCH_PAT secret to enable the"
            echo "self-perpetuating ~30-minute refresh loop."
            exit 0
          fi
          # Pace the loop: ~28 min wait + ~2 min of work ≈ 30-minute cadence.
          # (Public repo → Actions minutes are free, so a waiting job is fine.)
          echo "Waiting ~28 min before triggering the next run…"
          sleep 1680
          echo "Dispatching the next run…"
          # Retry transient failures (network blips, 5xx, secondary rate limits)
          # with backoff. A single dropped dispatch would otherwise break the
          # whole chain, and the schedule backstop is unreliable for this repo.
          ok=""
          for attempt in 1 2 3 4 5; do
            code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $DISPATCH_PAT" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/fetch-headlines.yml/dispatches" \
              -d '{"ref":"main"}') || code="000"
            echo "Attempt $attempt: GitHub API responded HTTP $code"
            if [ "$code" = "204" ]; then
              ok="yes"; break
            fi
            cat /tmp/resp.json 2>/dev/null || true
            sleep $((attempt * 5))
          done
          if [ -n "$ok" ]; then
            echo "Next run queued — loop continues."
          else
            echo "::warning::Self-dispatch failed after 5 attempts. The schedule"
            echo "safety net will restart the loop; check that DISPATCH_PAT is"
            echo "valid and has Actions: Read and write on this repo."
          fi
