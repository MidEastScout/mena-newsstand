name: Probe front-page sources (diagnostic)

# One-off helper. It runs scripts/probe_frontpages.py on GitHub's servers to see
# which NON-ISRAELI Middle East newspaper covers actually return a real image —
# across five sources (frontpages.com, Kiosko, Freedom Forum, per-paper e-papers
# and PressReader) — then commits the verdict to state/probe_results.json so the
# winners can be baked into scripts/fetch_frontpages.py. Safe to delete this file
# (and the probe script) once the front-page list is finalised.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install --no-cache-dir requests
      - run: python scripts/probe_frontpages.py
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/probe_results.json
          if git diff --cached --quiet; then
            echo "No change to probe results."
          else
            git commit -m "chore: probe front-page sources $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase --autostash origin main && git push origin main
          fi
